---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-platform-api
  namespace: deployment-platform
  labels:
    app: deployment-platform-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployment-platform-api
  template:
    metadata:
      labels:
        app: deployment-platform-api
    spec:
      serviceAccountName: deployment-platform

      containers:
        - name: api
          image: YOUR_ECR_REPO/deployment-platform-api:latest
          ports:
            - containerPort: 8000

          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-credentials
                  key: token
            - name: GITHUB_ORG
              valueFrom:
                secretKeyRef:
                  name: github-credentials
                  key: org
            - name: GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: github-credentials
                  key: repo
            - name: GITHUB_BRANCH
              value: "main"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: deployment-platform-api
  namespace: deployment-platform
spec:
  selector:
    app: deployment-platform-api
  ports:
    - port: 80
      targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deployment-platform-api
  namespace: deployment-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: api.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deployment-platform-api
                port:
                  number: 80