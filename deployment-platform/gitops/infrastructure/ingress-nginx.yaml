---
# HelmRepository — points at the ingress-nginx chart repo
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes.github.io/ingress-nginx

---
# HelmRelease — Flux installs/upgrades ingress-nginx automatically
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 30m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.x"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      replicaCount: 2
      service:
        type: LoadBalancer
        annotations:
          # Use an NLB on AWS for better performance
          service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      config:
        # Pass real client IP through to pods
        use-forwarded-headers: "true"
        compute-full-forwarded-for: "true"